# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 2.1.1
# DATE    : 2026-05-10
# Pairs with: generate_dashboard.py v2.1.1
# Changes from 2.0.1:
#   - Pinned yfinance==0.2.50 (newer, handles Yahoo cookie/crumb auth better)
#   - Added explicit requests + lxml deps
#   - generate_dashboard.py now uses session+UA + Stooq fallback when Yahoo blocks
# ─────────────────────────────────────────────────────────────────────────────

name: Refresh Dashboard v2.1.1

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # REQUIRED so the bot can push back to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print workflow version
        run: |
          echo "── refresh.yml v2.1.1 · 2026-05-10 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref:  $GITHUB_REF"
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          # yfinance 0.2.50 uses curl_cffi internally to handle Yahoo's bot detection.
          # Stooq fallback uses requests with a real User-Agent.
          pip install "yfinance==0.2.50" pandas numpy requests lxml curl_cffi
          echo "── Installed packages ──"
          pip show yfinance pandas numpy requests curl_cffi | grep -E "^(Name|Version)"

      - name: Regenerate index.html
        run: |
          set -e
          echo "── Running generate_dashboard.py ──"
          python generate_dashboard.py
          echo "── Output check ──"
          ls -la index.html
          echo "── First 5 lines of index.html ──"
          head -5 index.html
          echo "── File size: $(wc -c < index.html) bytes ──"

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "── No changes to index.html — skipping commit ──"
          else
            echo "── Committing changes ──"
            git commit -m "chore: refresh dashboard v2.1.1 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "── Pushed successfully ──"
          fi
