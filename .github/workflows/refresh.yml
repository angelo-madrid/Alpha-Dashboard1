# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 2.0.1
# DATE    : 2026-05-10
# Pairs with: generate_dashboard.py v2.0.0+
# Changes from 2.0.0:
#   - Added explicit permissions: contents: write (required for git push)
#   - Bumped checkout@v3 → v4, setup-python@v4 → v5 (fixes Node.js 20 deprecation)
#   - Hardened commit step: only runs if there are actual changes
#   - Added "set -e" + verbose logging on each step for easier debugging
# ─────────────────────────────────────────────────────────────────────────────

name: Refresh Dashboard v2.0.1

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # REQUIRED so the bot can push back to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print workflow version
        run: |
          echo "── refresh.yml v2.0.1 · 2026-05-10 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref:  $GITHUB_REF"
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          pip install "yfinance==0.2.37" pandas numpy
          echo "── Installed packages ──"
          pip show yfinance pandas numpy | grep -E "^(Name|Version)"

      - name: Regenerate index.html
        run: |
          set -e
          echo "── Running generate_dashboard.py ──"
          python generate_dashboard.py
          echo "── Output check ──"
          ls -la index.html
          echo "── First 5 lines of index.html ──"
          head -5 index.html
          echo "── File size: $(wc -c < index.html) bytes ──"

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "── No changes to index.html — skipping commit ──"
          else
            echo "── Committing changes ──"
            git commit -m "chore: refresh dashboard v2.0.1 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "── Pushed successfully ──"
          fi
