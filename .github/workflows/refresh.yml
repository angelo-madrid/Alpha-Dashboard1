# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 2.3.0
# DATE    : 2026-05-10
# Pairs with: generate_dashboard.py v2.3.0
# Changes from 2.2.0:
#   - Switched from Finnhub to Twelve Data (stocks/crypto/ETFs) + FRED (yields)
#   - API keys hardcoded directly in generate_dashboard.py (no GitHub Secrets)
#   - Dropped curl_cffi/yfinance heavy deps (not needed)
# ─────────────────────────────────────────────────────────────────────────────

name: Refresh Dashboard v2.3.0

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # REQUIRED so the bot can push back to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Print workflow version
        run: |
          echo "── refresh.yml v2.3.0 · 2026-05-10 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref:  $GITHUB_REF"
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          # Twelve Data and FRED both use plain HTTP; pandas/numpy for data ops.
          # yfinance kept as third-tier fallback (will fail on Actions but harmless).
          pip install pandas numpy requests yfinance==0.2.50
          echo "── Installed packages ──"
          pip show pandas numpy requests yfinance | grep -E "^(Name|Version)"

      - name: Regenerate index.html
        run: |
          set -e
          echo "── Running generate_dashboard.py ──"
          python generate_dashboard.py
          echo "── Output check ──"
          ls -la index.html
          echo "── First 5 lines of index.html ──"
          head -5 index.html
          echo "── File size: $(wc -c < index.html) bytes ──"

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "── No changes to index.html — skipping commit ──"
          else
            echo "── Committing changes ──"
            git commit -m "chore: refresh dashboard v2.3.0 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "── Pushed successfully ──"
          fi
