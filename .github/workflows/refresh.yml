# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 2.0.0
# DATE    : 2026-05-10
# Pairs with: generate_dashboard.py v2.0.0
# Notes   : yfinance==0.2.37 pinned (uses old reliable Yahoo API).
# ─────────────────────────────────────────────────────────────────────────────

name: Refresh Dashboard v2.0.0

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Print workflow version
        run: |
          echo "── refresh.yml v2.0.0 · 2026-05-10 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Install dependencies
        run: pip install "yfinance==0.2.37" pandas numpy

      - name: Regenerate index.html
        run: python generate_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: refresh dashboard v2.0.0 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
