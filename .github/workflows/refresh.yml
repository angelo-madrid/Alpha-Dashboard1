name: Refresh dashboard
# VERSION : 1.6.0
# DATE    : 2026-05-10 09:17 PHT
# Fix     : pin yfinance==0.2.37 — reliable time series on GitHub Actions

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "yfinance==0.2.37" pandas numpy

      - name: Regenerate index.html
        run: python generate_dashboard.py

      - name: Commit if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "Auto-refresh dashboard data v1.6.0"
            git push
          fi
