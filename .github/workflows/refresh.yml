# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 3.0.8
# DATE    : 2026-05-11
# Pairs with: generate_dashboard.py v3.0.7 (or later)
# Changes from 3.0.7:
#   - Added holdings.json diagnostic check before script run.
#     Shows last_updated and last_trade_notes from metadata, or warns if missing.
# Changes from 3.0.6:
#   - FIX: Removed `cache: 'pip'` from setup-python step. That option requires
#     a requirements.txt or pyproject.toml in the repo, which we don't have
#     (deps installed inline). Caused workflow to fail at "Set up Python" step.
# Changes from 2.3.1 (carried forward):
#   - Script v3.0.x no longer imports yfinance or curl_cffi → dropped from install
#   - Added concurrency guard (prevents overlapping scheduled + manual runs)
#   - Cleaner output verification with explicit byte-count threshold
#   - API keys remain HARDCODED in generate_dashboard.py (no GitHub Secrets)
# ─────────────────────────────────────────────────────────────────────────────
name: Refresh Dashboard v3.0.8
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false   # let in-flight refresh finish before next one

permissions:
  contents: write           # REQUIRED so the bot can push back to main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # typical run ~3 min; generous ceiling

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Note: no pip cache — would require requirements.txt in repo.
          # Deps are installed inline below; adds ~30s per run but no extra files.

      - name: Print workflow version
        run: |
          echo "── refresh.yml v3.0.8 · 2026-05-11 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref:  $GITHUB_REF"
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          # v3.0.x dropped yfinance and curl_cffi — pure requests + pandas + numpy.
          # Twelve Data and FRED both use plain HTTP via requests.
          pip install pandas numpy requests
          echo "── Installed packages ──"
          pip show pandas numpy requests | grep -E "^(Name|Version)"

      - name: Regenerate index.html
        env:
          CI: "1"             # suppresses browser auto-open at end of script
        run: |
          set -e
          # Diagnostic: check for holdings.json
          if [ -f "holdings.json" ]; then
            echo "── holdings.json found ──"
            python -c "import json; d=json.load(open('holdings.json')); m=d.get('_meta',{}); print(f'  Last updated: {m.get(\"last_updated\",\"unknown\")}'); print(f'  Last trade: {m.get(\"last_trade_notes\",\"none\")}')"
          else
            echo "⚠ holdings.json NOT found — script will use embedded fallback"
          fi
          echo "── Running generate_dashboard.py ──"
          python generate_dashboard.py
          echo "── Output check ──"
          ls -la index.html
          echo "── First 5 lines of index.html ──"
          head -5 index.html
          BYTES=$(wc -c < index.html)
          echo "── File size: $BYTES bytes ──"
          # Sanity threshold: a real index.html is ~200KB+; <50KB suggests failure
          if [ "$BYTES" -lt 50000 ]; then
            echo "⚠ WARNING: index.html is suspiciously small ($BYTES bytes)"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "── No changes to index.html — skipping commit ──"
          else
            echo "── Committing changes ──"
            git commit -m "chore: refresh dashboard v3.0.7 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "── Pushed successfully ──"
          fi
