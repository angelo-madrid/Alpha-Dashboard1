# ── REFRESH WORKFLOW ─────────────────────────────────────────────────────────
# VERSION : 3.0.6
# DATE    : 2026-05-11
# Pairs with: generate_dashboard.py v3.0.6
# Changes from 2.3.1:
#   - Script v3.0.x no longer imports yfinance or curl_cffi → dropped from install
#   - Added concurrency guard (prevents overlapping scheduled + manual runs)
#   - Cleaner output verification with explicit byte-count threshold
#   - API keys remain HARDCODED in generate_dashboard.py (no GitHub Secrets)
# Changes from 3.0.0 (workflow itself):
#   - Banner version bumped to track script version (cosmetic only — no logic changes)
# ─────────────────────────────────────────────────────────────────────────────
name: Refresh Dashboard v3.0.6
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 14:00 Manila daily
  workflow_dispatch:        # manual trigger from Actions tab

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false   # let in-flight refresh finish before next one

permissions:
  contents: write           # REQUIRED so the bot can push back to main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # typical run ~3 min; generous ceiling

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Print workflow version
        run: |
          echo "── refresh.yml v3.0.6 · 2026-05-11 ──"
          echo "Triggered: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Ref:  $GITHUB_REF"
          python3 --version
          pip --version

      - name: Install dependencies
        run: |
          set -e
          pip install --upgrade pip
          # v3.0.x dropped yfinance and curl_cffi — pure requests + pandas + numpy.
          # Twelve Data and FRED both use plain HTTP via requests.
          pip install pandas numpy requests
          echo "── Installed packages ──"
          pip show pandas numpy requests | grep -E "^(Name|Version)"

      - name: Regenerate index.html
        env:
          CI: "1"             # suppresses browser auto-open at end of script
        run: |
          set -e
          echo "── Running generate_dashboard.py ──"
          python generate_dashboard.py
          echo "── Output check ──"
          ls -la index.html
          echo "── First 5 lines of index.html ──"
          head -5 index.html
          BYTES=$(wc -c < index.html)
          echo "── File size: $BYTES bytes ──"
          # Sanity threshold: a real index.html is ~200KB+; <50KB suggests failure
          if [ "$BYTES" -lt 50000 ]; then
            echo "⚠ WARNING: index.html is suspiciously small ($BYTES bytes)"
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "── No changes to index.html — skipping commit ──"
          else
            echo "── Committing changes ──"
            git commit -m "chore: refresh dashboard v3.0.6 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "── Pushed successfully ──"
          fi
